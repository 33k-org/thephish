# app02 - Cortex 4 standalone configuration (analysis orchestration for
# TheHive, via the "docker" job runner: each analyzer/responder run spawns
# a short-lived sibling container next to this one).
#
# Secrets are NOT stored here. They're injected as container environment
# variables from app02/.env (see .env.example) and pulled in below via
# ${?VAR} HOCON substitution, so this file is safe to commit as-is.

# SECRET
play.http.secret.key = ${?CORTEX_SECRET_KEY}

# ELASTICSEARCH (Cortex's own instance - see docker-compose.yml for why
# it's not shared with app01's TheHive Elasticsearch)
search {
  uri = "http://cortex-elasticsearch:9200/"
  index = cortex
  user = "elastic"
  password = ${?CORTEX_ELASTICSEARCH_PASSWORD}
}

# ANALYZERS / RESPONDERS
# Pull StrangeBee's official catalog (JSON describing each analyzer, whose
# Docker images are pulled from their own registries - mostly
# hub.docker.com - at run time by Cortex itself via the mounted Docker
# socket). Enable individual analyzers/responders via the Cortex UI after
# first login (Organization -> Analyzers) - the catalog ships with far more
# than we want running by default.
analyzer.urls = ["https://catalogs.download.strangebee.com/latest/json/analyzers.json"]
responder.urls = ["https://catalogs.download.strangebee.com/latest/json/responders.json"]

# Per-analyzer config, keyed by each analyzer's "baseConfig" name (see its
# analyzer.json in TheHive-Project/Cortex-Analyzers) - lets you pre-fill API
# keys here instead of re-entering them per-analyzer-flavor in the UI.
analyzer.config {
  VirusTotal {
    key = ${?VIRUSTOTAL_API_KEY}
  }
  AbuseIPDB {
    key = ${?ABUSEIPDB_API_KEY}
  }
  URLhaus {
    API_Key = ${?URLHAUS_API_KEY}
  }
  "Urlscan.io" {
    key = ${?URLSCAN_API_KEY}
  }
}

