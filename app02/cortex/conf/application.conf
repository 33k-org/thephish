# app02 - Cortex 4 standalone configuration (analysis orchestration for
# TheHive, via the "docker" job runner: each analyzer/responder run spawns
# a short-lived sibling container next to this one).
#
# Secrets are NOT stored here. They're injected as container environment
# variables from app02/.env (see .env.example) and pulled in below via
# ${?VAR} HOCON substitution, so this file is safe to commit as-is.

# SECRET
play.http.secret.key = ${?CORTEX_SECRET_KEY}

# ELASTICSEARCH (Cortex's own instance - see docker-compose.yml for why
# it's not shared with app01's TheHive Elasticsearch)
search {
  uri = "http://cortex-elasticsearch:9200/"
  index = cortex
  user = "elastic"
  password = ${?CORTEX_ELASTICSEARCH_PASSWORD}
}

# ANALYZERS / RESPONDERS
# Two catalog sources: StrangeBee's official one (JSON describing each
# analyzer, whose Docker images are pulled from their own registries -
# mostly hub.docker.com - at run time by Cortex itself via the mounted
# Docker socket), and a local directory for our own custom analyzer(s) -
# see ../analyzers-local below. Enable individual analyzers/responders via
# the Cortex UI after first login (Organization -> Analyzers) - the
# StrangeBee catalog ships with far more than we want running by default.
# DOCKER JOB RUNNER - job directory
# job.directory: the path INSIDE this container where the shared jobs
# directory is mounted (must match the `./cortex/jobs:/tmp/cortex-jobs`
# bind mount in docker-compose.yml).
# job.dockerDirectory: the equivalent ABSOLUTE HOST path. Needed because
# Cortex spawns each analyzer/responder as a *sibling* container via the
# host's Docker socket - the Docker daemon resolves bind-mount sources
# against the host filesystem, not from inside this container.
#
# NOTE: docker-compose.yml's `command:` used to pass these as
# `--job-directory`/`--docker-job-directory` CLI flags instead. That looks
# right but doesn't work: Cortex's own entrypoint script only writes those
# flags' values into its config when it generates one itself, which only
# happens WITHOUT `--no-config` - and we pass `--no-config`. With it, the
# flags are silently discarded and job.directory/dockerDirectory fall back
# to reference.conf's default (java.io.tmpdir, plain /tmp) - which matches
# neither of our bind mounts. Confirmed on a real deploy: jobs failed with
# cortexutils falling back to stdin (same symptom as the root-owned-jobs-dir
# bug below, but a different cause) - the failing job's own docker-compose
# logs showed `volumes : /tmp/cortex-job-<id>-<n>`, with no "cortex-jobs"
# segment at all, meaning Cortex never pointed at the right directory in
# the first place. Setting these keys here instead sidesteps the
# --no-config interaction entirely.
job.directory = "/tmp/cortex-jobs"
job.dockerDirectory = ${?CORTEX_JOBS_DIR}

analyzer.urls = [
  "https://catalogs.download.strangebee.com/latest/json/analyzers.json"
  "/opt/cortex/analyzers-local"
]
responder.urls = ["https://catalogs.download.strangebee.com/latest/json/responders.json"]

# Per-analyzer config, keyed by each analyzer's "baseConfig" name (see its
# analyzer.json in TheHive-Project/Cortex-Analyzers) - lets you pre-fill API
# keys here instead of re-entering them per-analyzer-flavor in the UI.
analyzer.config {
  VirusTotal {
    key = ${?VIRUSTOTAL_API_KEY}
  }
  AbuseIPDB {
    key = ${?ABUSEIPDB_API_KEY}
  }
  URLhaus {
    API_Key = ${?URLHAUS_API_KEY}
  }
  "Urlscan.io" {
    key = ${?URLSCAN_API_KEY}
  }
  # Our own custom analyzer - see ../../../ollama-analyzer/. Its image is
  # built locally (not pulled from a registry - see docker-compose.yml's
  # ollama-analyzer-image build-only service) and its catalog entry comes
  # from the local directory added to analyzer.urls above.
  Ollama {
    ollama_host = ${?OLLAMA_HOST}
    ollama_port = ${?OLLAMA_PORT}
    model = ${?OLLAMA_MODEL}
  }
}

# Per-responder config, same idea as analyzer.config above. The Mailer
# responder is what actually sends ThePhish-NG's verdict emails - see
# mail-server/README.md - ThePhish-NG itself has no SMTP logic at all, it
# just starts this responder on a case task via the Cortex/TheHive API.
responder.config {
  Mailer {
    from = ${?MAILER_FROM}
    smtp_host = ${?MAILER_SMTP_HOST}
    smtp_port = ${?MAILER_SMTP_PORT}
    smtp_user = ${?MAILER_SMTP_USER}
    smtp_pwd = ${?MAILER_SMTP_PASSWORD}
  }
}
