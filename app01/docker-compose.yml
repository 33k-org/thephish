services:
  cassandra:
    image: "cassandra:${CASSANDRA_VERSION}"
    container_name: cassandra
    hostname: cassandra
    restart: unless-stopped
    # No `user:` override here (unlike elasticsearch/thehive below): the
    # vanilla Docker Hub cassandra image expects to run as root and writes
    # its GC log to /opt/cassandra/logs, a path baked into the image (not
    # one of the bind mounts below) - forcing an unprivileged UID breaks
    # write access to it with "Permission denied".
    environment:
      - CASSANDRA_CLUSTER_NAME=TheHive
      - CASSANDRA_AUTHENTICATOR=PasswordAuthenticator
      - CASSANDRA_NUM_TOKENS=4
      - HEAP_NEWSIZE=1024M
      # ~1/4 of MAX_HEAP_SIZE, per Datastax JVM tuning guidance
      - MAX_HEAP_SIZE=8G
    volumes:
      - ./cassandra/data:/var/lib/cassandra
      - ./cassandra/logs:/var/log/cassandra
    deploy:
      resources:
        limits:
          memory: 8.8G
          cpus: "5.333"
    memswap_limit: 8.8G
    networks:
      - thehive-network
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -u cassandra -p cassandra -e 'describe keyspaces' || exit 1"]
      start_period: 120s
      interval: 2s
      timeout: 1s
      retries: 3

  elasticsearch:
    image: "elasticsearch:${ELASTICSEARCH_VERSION}"
    container_name: elasticsearch
    hostname: elasticsearch
    restart: unless-stopped
    user: "${UID}:0"
    environment:
      - http.host=0.0.0.0
      - discovery.type=single-node
      - cluster.name=hive
      - thread_pool.search.queue_size=100000
      - thread_pool.write.queue_size=100000
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - ES_JAVA_OPTS=-Xms8G -Xmx8G
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
      - ./elasticsearch/logs:/usr/share/elasticsearch/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 8.8G
          cpus: "5.333"
    memswap_limit: 8.8G
    networks:
      - thehive-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -u 'elastic:${ELASTICSEARCH_PASSWORD}' http://elasticsearch:9200/_cat/health || exit 1"]
      start_period: 40s
      interval: 2s
      timeout: 1s
      retries: 5

  thehive:
    image: "strangebee/thehive:${THEHIVE_VERSION}"
    container_name: thehive
    hostname: thehive
    restart: unless-stopped
    # Config is provided entirely by the mounted application.conf; don't
    # let the entrypoint generate/overwrite it.
    command: "--no-config --no-config-secret"
    user: "${UID}:${GID}"
    environment:
      - |
        JAVA_OPTS=
          -Xms7250M
          -Xmx7250M
          -XX:MaxMetaspaceSize=400m
          -XX:ReservedCodeCacheSize=400m
      # Referenced from application.conf via ${?VAR} substitution
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - THEHIVE_SECRET_KEY=${THEHIVE_SECRET_KEY}
    volumes:
      # Mount only this one file - bind-mounting the whole /etc/thehive
      # directory would shadow the image's own logback.xml/
      # logback-migration.xml (the entrypoint hardcodes
      # -Dlogger.file=/etc/thehive/logback.xml), silently downgrading
      # logging to Logback's bare console-only BasicConfigurator fallback
      # with no file appender - which is why thehive/logs/ stayed empty.
      - ./thehive/conf/application.conf:/etc/thehive/application.conf:ro
      - ./thehive/data/files:/opt/thp/thehive/files
      - ./thehive/logs:/var/log/thehive
    deploy:
      resources:
        limits:
          memory: 9G
          cpus: "7.333"
    memswap_limit: 9G
    networks:
      - thehive-network
    ports:
      - "0.0.0.0:9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f thehive:9000/thehive/api/status || exit 1"]
      start_period: 40s
      interval: 10s
      timeout: 1s
      retries: 5
    depends_on:
      elasticsearch:
        condition: service_healthy
      cassandra:
        condition: service_healthy

networks:
  thehive-network:
