# app01 - TheHive 5 standalone configuration (TheHive + Cassandra + Elasticsearch)
#
# Secrets (play.http.secret.key, ELASTICSEARCH_PASSWORD, CORTEX_API_KEY) are
# NOT stored here. They're injected as container environment variables from
# app01/.env (see .env.example) and pulled in below via ${?VAR} HOCON
# substitution, so this file is safe to commit as-is.

# SECRET
play.http.secret.key = ${?THEHIVE_SECRET_KEY}

# DATABASE CONFIGURATION (Cassandra, via JanusGraph's cql backend)
# username/password auth against cassandra's PasswordAuthenticator (see
# docker-compose.yml) - default superuser creds until changed. Consider
# creating a dedicated non-superuser role for TheHive post-bootstrap.
db.janusgraph.storage {
  backend = cql
  hostname = ["cassandra"]
  username = "cassandra"
  password = "cassandra"
  cql {
    cluster-name = thp
    keyspace = thehive
  }
}

# INDEX CONFIGURATION (Elasticsearch)
# NOTE: the password is NOT set here via ${?VAR} substitution - JanusGraph's
# elasticsearch.http.auth.basic.password option silently resolves to an
# empty string when set this way (confirmed by reproducing locally), even
# though the identical substitution pattern works fine elsewhere in this
# file (e.g. play.http.secret.key above). Instead it's injected as a JVM
# system property via JAVA_OPTS in docker-compose.yml, which Typesafe
# Config always resolves before this bug can kick in.
db.janusgraph.index.search {
  backend = elasticsearch
  hostname = ["elasticsearch"]
  index-name = thehive
  elasticsearch.http.auth {
    type = "basic"
    basic {
      username = "elastic"
    }
  }
}

# ATTACHMENT STORAGE
storage {
  provider: localfs
  localfs {
    location: /opt/thp/thehive/files
  }
}

# SERVICE CONFIGURATION
play.http.context: "/"
play.http.parser.maxDiskBuffer: 1GB
play.http.parser.maxMemoryBuffer: 256kB
stream.longPolling.refresh: 45 seconds
stream {
  get {
    maxAttempts = 5
    minBackoff = 100 milliseconds
    maxBackoff = 500 milliseconds
    randomFactor = 0.2
  }
}

# CONNECTORS
# Both modules are enabled by default in StrangeBee's own reference
# deployment even before a Cortex/MISP server is configured - TheHive
# starts fine with these enabled and an empty server list. Nothing below
# this line is required for app01 to run standalone.
scalligraph.modules += org.thp.thehive.connector.cortex.CortexModule
scalligraph.modules += org.thp.thehive.connector.misp.MispModule

# =====================================================================
# APP02 (Cortex + MISP) connection.
#
# MISP's port is 9443, not the default 443 - app02's docker-compose.yml
# maps container 443 to host 9443 (same reason its own BASE_URL needs the
# port spelled out - see app02/README.md).
#
# MISP serves its own self-signed cert (app02's own choice, kept simple
# for an internal-only LAN service - see app02/README.md's "MISP's
# self-signed cert" section). TheHive's WS client rejects untrusted certs
# by default; the properly-secure fix is importing MISP's cert into the
# JVM truststore, but for an internal-only deployment this is the
# pragmatic alternative StrangeBee's own docs mention.
#
# Confirmed on a real deploy: this global setting alone was NOT enough for
# the MISP connector specifically - it also needed its own per-server
# "Don't check certificate authority" toggle switched off in the UI
# (Platform management -> Connectors -> MISP -> edit server), which isn't
# expressible from this file. Do that once after first boot, alongside
# adding CORTEX_API_KEY/MISP_API_KEY to .env.
play.ws.ssl.loose.acceptAnyCertificate = true

cortex {
  servers: [
    {
      name = "app02-cortex"
      url = "http://app02:9001"
      auth {
        type = "bearer"
        key = ${?CORTEX_API_KEY}
      }
      wsConfig {}
    }
  ]
}

misp {
  servers: [
    {
      name = "app02-misp"
      url = "https://app02:9443"
      auth {
        type = "key"
        key = ${?MISP_API_KEY}
      }
    }
  ]
}
# =====================================================================
